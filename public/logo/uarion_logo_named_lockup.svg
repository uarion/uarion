<?xml version="1.0" encoding="UTF-8"?>
<svg width="3600" height="1200" viewBox="0 0 3600 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="lockupTitle lockupDesc">
  <title id="lockupTitle">UARION Global Logo Lockup</title>
  <desc id="lockupDesc">A scalable premium orbital identity mark for UARION AI, representing verified AI identity, trusted registry, and connected intelligence.</desc>

  <defs>
    <linearGradient id="ringMain" x1="130" y1="280" x2="890" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D8FF"/>
      <stop offset="42%" stop-color="#2F7DFF"/>
      <stop offset="72%" stop-color="#5D5BFF"/>
      <stop offset="100%" stop-color="#8B42FF"/>
    </linearGradient>

    <linearGradient id="ringInner" x1="185" y1="705" x2="840" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#83F4FF"/>
      <stop offset="48%" stop-color="#78A8FF"/>
      <stop offset="100%" stop-color="#8A6CFF"/>
    </linearGradient>

    <radialGradient id="core" cx="37%" cy="31%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="18%" stop-color="#EAFBFF"/>
      <stop offset="43%" stop-color="#3FC6FF"/>
      <stop offset="73%" stop-color="#176CFF"/>
      <stop offset="100%" stop-color="#092A78"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#00081A" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="22" flood-color="#1C7CFF" flood-opacity="0.34"/>
    </filter>

    <filter id="coreGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#42BFFF" flood-opacity="0.62"/>
    </filter>

    <style>
      .wordmark {
        font-family: Inter, Montserrat, Avenir Next, Arial, sans-serif;
        font-size: 210px;
        font-weight: 850;
        letter-spacing: 28px;
        fill: #F7FBFF;
      }
      .tagline {
        font-family: Inter, Montserrat, Avenir Next, Arial, sans-serif;
        font-size: 46px;
        font-weight: 600;
        letter-spacing: 5px;
        fill: #8FB7F2;
      }
      .description {
        font-family: Inter, Montserrat, Avenir Next, Arial, sans-serif;
        font-size: 34px;
        font-weight: 400;
        letter-spacing: 1px;
        fill: #B8C8E8;
      }
    </style>
  </defs>

  <rect width="3600" height="1200" fill="#050D1C"/>

  <g id="uarion-symbol" transform="translate(130 150)" filter="url(#glow)">
    <ellipse cx="470" cy="450" rx="405" ry="142" transform="rotate(-21 470 450)"
             fill="none" stroke="url(#ringMain)" stroke-width="72" stroke-linecap="round"/>

    <ellipse cx="470" cy="450" rx="318" ry="100" transform="rotate(-21 470 450)"
             fill="none" stroke="#07142A" stroke-width="48" stroke-linecap="round"/>

    <ellipse cx="470" cy="450" rx="333" ry="110" transform="rotate(-21 470 450)"
             fill="none" stroke="url(#ringInner)" stroke-width="25" stroke-linecap="round" opacity="0.95"/>

    <circle cx="470" cy="450" r="92" fill="url(#core)" filter="url(#coreGlow)"/>
    <circle cx="438" cy="407" r="31" fill="#FFFFFF" opacity="0.94"/>

    <circle cx="265" cy="343" r="10" fill="#D5E7FF"/>
    <circle cx="690" cy="583" r="12" fill="#D5E7FF"/>
    <circle cx="526" cy="747" r="7" fill="#7DB9FF" opacity="0.72"/>
  </g>

  <text class="wordmark" x="1070" y="535">UARION</text>
  <text class="tagline" x="1082" y="668">THE TRUST LAYER FOR AI</text>
  <text class="description" x="1082" y="748">Universal AI Registry &amp; Identity Open Network</text>
</svg>
