<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="2048" height="2048" viewBox="0 0 2048 2048">
<title>Outline Style</title>
<desc>Premium scalable SVG logo variant for UARION.</desc>

<defs>
<linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#22D8FF"/>
<stop offset="55%" stop-color="#387BFF"/>
<stop offset="100%" stop-color="#8A42FF"/>
</linearGradient>
<radialGradient id="core" cx="40%" cy="35%" r="70%">
<stop offset="0%" stop-color="#FFFFFF"/>
<stop offset="40%" stop-color="#48C8FF"/>
<stop offset="100%" stop-color="#1558FF"/>
</radialGradient>
<radialGradient id="bg" cx="50%" cy="45%" r="75%">
<stop offset="0%" stop-color="#112A5A"/>
<stop offset="100%" stop-color="#050B18"/>
</radialGradient>
</defs>

<rect width="2048" height="2048" rx="420" fill="#07142A"/>

    <g transform="translate(1024 1024) rotate(-21)">
      <ellipse cx="0" cy="0" rx="700" ry="240" fill="none" stroke="url(#ring)" stroke-width="120"/>
      <ellipse cx="0" cy="0" rx="560" ry="180" fill="none" stroke="#07142A" stroke-width="72"/>
      <ellipse cx="0" cy="0" rx="585" ry="194" fill="none" stroke="url(#ring)" stroke-width="36" opacity="0.7"/>
    </g>
    <circle cx="1024" cy="1024" r="160" fill="url(#core)"/>
    <circle cx="970" cy="950" r="52" fill="white" opacity="0.92"/>
    <circle cx="680" cy="860" r="16" fill="#D7E7FF"/>
    <circle cx="1410" cy="1250" r="18" fill="#D7E7FF"/>
    

        <text x="1024" y="1780" text-anchor="middle"
        font-family="Inter,Arial,sans-serif"
        font-size="190" font-weight="800"
        letter-spacing="22"
        fill="#F7FBFF">UARION</text>
        
</svg>