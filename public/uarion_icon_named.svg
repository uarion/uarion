<?xml version="1.0" encoding="UTF-8"?>
<svg width="2048" height="2048" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="uarionTitle uarionDesc">
  <title id="uarionTitle">UARION Orbital Icon</title>
  <desc id="uarionDesc">A scalable premium orbital identity mark for UARION AI, representing verified AI identity, trusted registry, and connected intelligence.</desc>

  <defs>
    <radialGradient id="bg" cx="50%" cy="48%" r="72%">
      <stop offset="0%" stop-color="#102A5A"/>
      <stop offset="58%" stop-color="#07142A"/>
      <stop offset="100%" stop-color="#040814"/>
    </radialGradient>

    <linearGradient id="ringMain" x1="365" y1="685" x2="1680" y2="1335" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D8FF"/>
      <stop offset="42%" stop-color="#2F7DFF"/>
      <stop offset="72%" stop-color="#5D5BFF"/>
      <stop offset="100%" stop-color="#8B42FF"/>
    </linearGradient>

    <linearGradient id="ringInner" x1="460" y1="1210" x2="1570" y2="760" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#83F4FF"/>
      <stop offset="48%" stop-color="#78A8FF"/>
      <stop offset="100%" stop-color="#8A6CFF"/>
    </linearGradient>

    <radialGradient id="core" cx="37%" cy="31%" r="72%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="18%" stop-color="#EAFBFF"/>
      <stop offset="43%" stop-color="#3FC6FF"/>
      <stop offset="73%" stop-color="#176CFF"/>
      <stop offset="100%" stop-color="#092A78"/>
    </radialGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#00081A" flood-opacity="0.55"/>
      <feDropShadow dx="0" dy="0" stdDeviation="28" flood-color="#1C7CFF" flood-opacity="0.35"/>
    </filter>

    <filter id="coreGlow" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="0" stdDeviation="42" flood-color="#42BFFF" flood-opacity="0.65"/>
    </filter>
  </defs>

  <rect width="2048" height="2048" rx="420" fill="url(#bg)"/>

  <g id="uarion-orbital-symbol" filter="url(#glow)">
    <ellipse cx="1024" cy="1024" rx="720" ry="252" transform="rotate(-21 1024 1024)"
             fill="none" stroke="url(#ringMain)" stroke-width="124" stroke-linecap="round"/>

    <ellipse cx="1024" cy="1024" rx="560" ry="178" transform="rotate(-21 1024 1024)"
             fill="none" stroke="#07142A" stroke-width="84" stroke-linecap="round"/>

    <ellipse cx="1024" cy="1024" rx="590" ry="196" transform="rotate(-21 1024 1024)"
             fill="none" stroke="url(#ringInner)" stroke-width="42" stroke-linecap="round" opacity="0.95"/>

    <circle cx="1024" cy="1024" r="164" fill="url(#core)" filter="url(#coreGlow)"/>
    <circle cx="970" cy="948" r="54" fill="#FFFFFF" opacity="0.94"/>

    <circle cx="664" cy="842" r="18" fill="#D5E7FF"/>
    <circle cx="1416" cy="1262" r="22" fill="#D5E7FF"/>
    <circle cx="1120" cy="1540" r="11" fill="#7DB9FF" opacity="0.72"/>
  </g>
</svg>
